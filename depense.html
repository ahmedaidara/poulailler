<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DAKAR CHICKEN EXPRESS - Gestion des Dettes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/0QBKNcGj/photo-5782651308169956527-x.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .main-interface {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            min-height: 90vh;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #e0e0e0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e293b;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }
        
        .filters-container {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-group label {
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .filter-group input,
        .filter-group select {
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s;
            background: white;
        }
        
        .filter-group input:focus,
        .filter-group select:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .debts-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        .debts-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 12px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: left;
        }
        
        .debts-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        
        .debts-table tr:hover {
            background: #f8fafc;
            cursor: pointer;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-impaye {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .status-partiel {
            background: #fef3c7;
            color: #d97706;
        }
        
        .status-paye {
            background: #d1fae5;
            color: #059669;
        }
        
        .amount-total { font-weight: 700; color: #1e293b; }
        .amount-paid { color: #10b981; font-weight: 500; }
        .amount-remaining { color: #dc2626; font-weight: 700; }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .action-icon.view {
            background: #e0e7ff;
            color: #4f46e5;
        }
        
        .action-icon.edit {
            background: #fed7aa;
            color: #ea580c;
        }
        
        .action-icon:hover {
            transform: scale(1.05);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            position: sticky;
            top: 0;
            background: white;
            padding: 20px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #334155;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .form-input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 3000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .message.success { background: #10b981; }
        .message.error { background: #ef4444; }
        .message.warning { background: #f59e0b; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .main-interface { padding: 15px; }
            .header { flex-direction: column; text-align: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .filters-grid { grid-template-columns: 1fr; }
            .debts-table th, .debts-table td { padding: 8px; font-size: 0.75rem; }
            .status-badge { padding: 3px 8px; font-size: 0.7rem; }
            .action-icon { width: 28px; height: 28px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div id="appInterface" class="main-interface">
    <div class="header">
        <div class="logo-container">
            <img src="https://i.postimg.cc/0QBKNcGj/photo-5782651308169956527-x.jpg" alt="Logo" class="logo">
            <div>
                <h2>DAKAR CHICKEN EXPRESS</h2>
                <p style="color: #666;">Gestion des Dettes Clients</p>
            </div>
        </div>
        <button id="backToSiteBtn" class="back-btn">
            <i class="fas fa-arrow-left"></i> Retour au site
        </button>
    </div>
    
    <!-- Stats rapides -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalDebtAmount">0 F CFA</div>
            <div class="stat-label">Total des dettes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalImpays">0</div>
            <div class="stat-label">Clients débiteurs</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgDebt">0 F CFA</div>
            <div class="stat-label">Dette moyenne</div>
        </div>
    </div>
    
    <!-- Filtres -->
    <div class="filters-container">
        <div class="filters-grid">
            <div class="filter-group">
                <label><i class="fas fa-store"></i> Boutique</label>
                <select id="boutiqueFilter">
                    <option value="all">🏪 Toutes les boutiques</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-user"></i> Rechercher</label>
                <input type="text" id="searchInput" placeholder="Nom ou téléphone...">
            </div>
            <div class="filter-group">
                <label><i class="fas fa-filter"></i> Statut</label>
                <select id="statusFilter">
                    <option value="all">📋 Tous</option>
                    <option value="impaye">🔴 Impayés</option>
                    <option value="partiel">🟠 Paiement partiel</option>
                    <option value="paye">🟢 Payés</option>
                </select>
            </div>
            <div class="filter-group">
                <button id="refreshBtn" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Actualiser
                </button>
            </div>
        </div>
    </div>
    
    <!-- Tableau des dettes -->
    <div class="table-container">
        <div class="table-wrapper">
            <table class="debts-table">
                <thead>
                    <tr>
                        <th>Boutique</th>
                        <th>Client</th>
                        <th>Téléphone</th>
                        <th>N° Facture</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Payé</th>
                        <th>Reste</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="debtsTableBody">
                    <tr><td colspan="10" style="text-align: center; padding: 40px;">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Détail Dette -->
<div id="debtModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-file-invoice"></i> Détail de la dette</h3>
            <button class="close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
            <button id="updatePaymentBtn" class="btn btn-success">
                <i class="fas fa-save"></i> Enregistrer
            </button>
            <button id="printPDFBtn" class="btn btn-primary">
                <i class="fas fa-file-pdf"></i> PDF
            </button>
        </div>
    </div>
</div>

<div id="messageContainer"></div>

<script>
    // Configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAAQ9G3w94aM7iGc_ufHMzdCvrwzzEzlhI",
        authDomain: "poulailler-3515e.firebaseapp.com",
        projectId: "poulailler-3515e",
        storageBucket: "poulailler-3515e.firebasestorage.app",
        messagingSenderId: "482441929117",
        appId: "1:482441929117:web:7970df401b0125560acf74"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let allInvoices = [];
    let currentInvoice = null;
    
    // Fonction pour obtenir le nom de la boutique
    function getBoutiqueName(inv) {
        if (inv.boutiqueName) return inv.boutiqueName;
        if (inv.boutique === 'sacre-coeur') return 'Sacré Coeur 3';
        if (inv.boutique === 'keur-massar') return 'Keur Massar';
        return inv.boutique || 'Inconnue';
    }
    
    // Charger les dettes (TOUTES les boutiques)
    async function loadDebts() {
        const tbody = document.getElementById('debtsTableBody');
        tbody.innerHTML = '<tr><td colspan="10" style="text-align: center;"><i class="fas fa-spinner fa-spin"></i> Chargement...</td></tr>';
        
        try {
            const snapshot = await db.collection('invoices').get();
            
            allInvoices = [];
            snapshot.forEach(doc => {
                const inv = doc.data();
                inv.id = doc.id;
                allInvoices.push(inv);
            });
            
            // Trier par date (récent en premier)
            allInvoices.sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
            
            // Remplir le filtre boutique
            populateBoutiqueFilter();
            
            // Appliquer les filtres
            applyFilters();
            updateStats();
            
        } catch (error) {
            console.error("Erreur:", error);
            tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; color: red;">Erreur de chargement</td></tr>';
        }
    }
    
    // Remplir le select des boutiques
    function populateBoutiqueFilter() {
        const select = document.getElementById('boutiqueFilter');
        const boutiques = new Set();
        
        allInvoices.forEach(inv => {
            const name = getBoutiqueName(inv);
            if (name) boutiques.add(name);
        });
        
        // Garder seulement l'option "Toutes"
        while (select.options.length > 1) {
            select.remove(1);
        }
        
        boutiques.forEach(b => {
            const option = document.createElement('option');
            option.value = b;
            option.textContent = b;
            select.appendChild(option);
        });
    }
    
    // Appliquer les filtres
    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;
        const boutiqueFilter = document.getElementById('boutiqueFilter').value;
        
        let filtered = allInvoices.filter(inv => {
            const paiement = inv.paiement || { statut: 'impaye', resteAPayer: inv.total || 0 };
            const invBoutique = getBoutiqueName(inv);
            
            // Filtre boutique
            if (boutiqueFilter !== 'all' && invBoutique !== boutiqueFilter) return false;
            
            // Filtre statut
            if (statusFilter !== 'all' && paiement.statut !== statusFilter) return false;
            
            // Filtre recherche
            if (searchTerm) {
                const name = (inv.client?.name || '').toLowerCase();
                const phone = (inv.client?.phone || '').toLowerCase();
                if (!name.includes(searchTerm) && !phone.includes(searchTerm)) return false;
            }
            
            return true;
        });
        
        // Trier par reste à payer (plus gros en premier)
        filtered.sort((a, b) => {
            const resteA = a.paiement?.resteAPayer || 0;
            const resteB = b.paiement?.resteAPayer || 0;
            return resteB - resteA;
        });
        
        displayTable(filtered);
    }
    
    // Afficher le tableau
    function displayTable(invoices) {
        const tbody = document.getElementById('debtsTableBody');
        
        if (invoices.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; padding: 40px;">Aucune dette trouvée</td></tr>';
            return;
        }
        
        tbody.innerHTML = '';
        
        invoices.forEach(inv => {
            const paiement = inv.paiement || { montantPaye: 0, resteAPayer: 0, statut: 'impaye' };
            const reste = (paiement.resteAPayer && paiement.resteAPayer > 0) ? paiement.resteAPayer : 0;
            const montantPaye = paiement.montantPaye || 0;
            
            const date = inv.date?.seconds ? new Date(inv.date.seconds * 1000) : new Date(inv.date);
            const dateStr = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
            const boutiqueName = getBoutiqueName(inv);
            
            let statutClass = '';
            let statutText = '';
            if (paiement.statut === 'paye') {
                statutClass = 'status-paye';
                statutText = 'Payé';
            } else if (paiement.statut === 'partiel') {
                statutClass = 'status-partiel';
                statutText = 'Partiel';
            } else {
                statutClass = 'status-impaye';
                statutText = 'Impayé';
            }
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${boutiqueName}</td>
                <td><strong>${inv.client?.name || 'Anonyme'}</strong></td>
                <td>${inv.client?.phone || '--'}</td>
                <td>${inv.invoiceNumber || 'N/A'}</td>
                <td>${dateStr}</td>
                <td class="amount-total">${(inv.total || 0).toLocaleString('fr-FR')} F CFA</td>
                <td class="amount-paid">${montantPaye.toLocaleString('fr-FR')} F CFA</td>
                <td class="amount-remaining">${reste.toLocaleString('fr-FR')} F CFA</td>
                <td><span class="status-badge ${statutClass}">${statutText}</span></td>
                <td>
                    <div class="action-buttons">
                        <button class="action-icon view" onclick="viewDebt('${inv.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="action-icon edit" onclick="editDebt('${inv.id}')">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }
    
    // Mettre à jour les statistiques
    function updateStats() {
        let totalDebt = 0;
        let debtorsCount = 0;
        
        allInvoices.forEach(inv => {
            const reste = (inv.paiement?.resteAPayer && inv.paiement.resteAPayer > 0) ? inv.paiement.resteAPayer : 0;
            if (reste > 0) {
                totalDebt += reste;
                debtorsCount++;
            }
        });
        
        document.getElementById('totalDebtAmount').innerHTML = totalDebt.toLocaleString('fr-FR') + ' F CFA';
        document.getElementById('totalImpays').innerHTML = debtorsCount;
        document.getElementById('avgDebt').innerHTML = debtorsCount > 0 
            ? Math.round(totalDebt / debtorsCount).toLocaleString('fr-FR') + ' F CFA'
            : '0 F CFA';
    }
    
    // Voir le détail
    async function viewDebt(invoiceId) {
        const doc = await db.collection('invoices').doc(invoiceId).get();
        if (!doc.exists) return;
        
        currentInvoice = { id: doc.id, ...doc.data() };
        showModal(currentInvoice, false);
    }
    
    // Modifier la dette
    async function editDebt(invoiceId) {
        const doc = await db.collection('invoices').doc(invoiceId).get();
        if (!doc.exists) return;
        
        currentInvoice = { id: doc.id, ...doc.data() };
        showModal(currentInvoice, true);
    }
    
    // Afficher le modal
    function showModal(inv, editable) {
        const paiement = inv.paiement || { montantPaye: 0, resteAPayer: 0, modePaiement: 'especes', statut: 'impaye' };
        const reste = (paiement.resteAPayer && paiement.resteAPayer > 0) ? paiement.resteAPayer : 0;
        const montantPaye = paiement.montantPaye || 0;
        
        const date = inv.date?.seconds ? new Date(inv.date.seconds * 1000) : new Date(inv.date);
        const boutiqueName = getBoutiqueName(inv);
        
        let itemsHtml = '';
        if (inv.items && inv.items.length > 0) {
            itemsHtml = '<div style="margin: 15px 0;"><strong>Articles :</strong><div style="margin-top: 8px;">';
            inv.items.forEach(item => {
                itemsHtml += `<div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee;">
                    <span>${item.name} x ${item.quantity}</span>
                    <span>${(item.subtotal || 0).toLocaleString('fr-FR')} F CFA</span>
                </div>`;
            });
            itemsHtml += '</div></div>';
        }
        
        let modalHtml = `
            <div style="margin-bottom: 20px;">
                <p><strong>Boutique :</strong> ${boutiqueName}</p>
                <p><strong>Client :</strong> ${inv.client?.name || 'Non renseigné'}</p>
                <p><strong>Téléphone :</strong> ${inv.client?.phone || '--'}</p>
                <p><strong>N° Facture :</strong> ${inv.invoiceNumber || 'N/A'}</p>
                <p><strong>Date :</strong> ${date.toLocaleDateString('fr-FR')}</p>
            </div>
            
            ${itemsHtml}
            
            <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin: 15px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span><strong>TOTAL :</strong></span>
                    <span style="font-size: 1.2rem; font-weight: bold;">${(inv.total || 0).toLocaleString('fr-FR')} F CFA</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: #10b981;">
                    <span><strong>Payé :</strong></span>
                    <span>${montantPaye.toLocaleString('fr-FR')} F CFA</span>
                </div>
                <div style="display: flex; justify-content: space-between; color: #dc2626;">
                    <span><strong>Reste :</strong></span>
                    <span style="font-size: 1.1rem; font-weight: bold;">${reste.toLocaleString('fr-FR')} F CFA</span>
                </div>
            </div>
        `;
        
        if (editable) {
            modalHtml += `
                <div class="form-group">
                    <label>Mode de paiement</label>
                    <select id="editModePaiement" class="form-input">
                        <option value="especes" ${paiement.modePaiement === 'especes' ? 'selected' : ''}>💵 Espèces</option>
                        <option value="wave" ${paiement.modePaiement === 'wave' ? 'selected' : ''}>📱 Wave</option>
                        <option value="orange" ${paiement.modePaiement === 'orange' ? 'selected' : ''}>📱 Orange Money</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Montant payé (F CFA)</label>
                    <input type="number" id="editMontantPaye" class="form-input" value="${montantPaye}" min="0" step="100">
                </div>
                <div id="statutPreview" style="margin-top: 10px; padding: 10px; border-radius: 8px; text-align: center;"></div>
            `;
        }
        
        document.getElementById('modalBody').innerHTML = modalHtml;
        document.getElementById('debtModal').style.display = 'flex';
        
        if (editable) {
            const preview = () => {
                const montant = parseInt(document.getElementById('editMontantPaye').value) || 0;
                const total = inv.total || 0;
                const resteCalc = total - montant;
                const previewDiv = document.getElementById('statutPreview');
                
                if (montant === 0) {
                    previewDiv.innerHTML = '🔴 Statut : Impayé';
                    previewDiv.style.background = '#fee2e2';
                    previewDiv.style.color = '#dc2626';
                } else if (montant >= total) {
                    previewDiv.innerHTML = '🟢 Statut : Payé intégralement';
                    previewDiv.style.background = '#d1fae5';
                    previewDiv.style.color = '#059669';
                } else {
                    previewDiv.innerHTML = `🟠 Statut : Paiement partiel (reste ${resteCalc.toLocaleString('fr-FR')} F CFA)`;
                    previewDiv.style.background = '#fef3c7';
                    previewDiv.style.color = '#d97706';
                }
            };
            
            document.getElementById('editMontantPaye').addEventListener('input', preview);
            preview();
        }
    }
    
    // Mettre à jour le paiement
    async function updatePayment() {
        if (!currentInvoice) return;
        
        const newMontant = parseInt(document.getElementById('editMontantPaye')?.value) || 0;
        const newMode = document.getElementById('editModePaiement')?.value || 'especes';
        const total = currentInvoice.total || 0;
        const reste = Math.max(0, total - newMontant);
        
        let statut = 'impaye';
        if (newMontant === 0) statut = 'impaye';
        else if (newMontant >= total) statut = 'paye';
        else statut = 'partiel';
        
        try {
            await db.collection('invoices').doc(currentInvoice.id).update({
                'paiement.montantPaye': newMontant,
                'paiement.resteAPayer': reste,
                'paiement.modePaiement': newMode,
                'paiement.statut': statut,
                'paiement.datePaiement': new Date().toISOString()
            });
            
            showMessage('✅ Paiement mis à jour', 'success');
            closeModal();
            loadDebts();
            
        } catch (error) {
            console.error(error);
            showMessage('❌ Erreur lors de la mise à jour', 'error');
        }
    }
    
    // Générer PDF
    async function generatePDF() {
        if (!currentInvoice) return;
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const inv = currentInvoice;
        const paiement = inv.paiement || {};
        const reste = (paiement.resteAPayer && paiement.resteAPayer > 0) ? paiement.resteAPayer : 0;
        
        doc.setFontSize(20);
        doc.text("DAKAR CHICKEN EXPRESS", 105, 20, { align: 'center' });
        doc.setFontSize(12);
        doc.text("Facture - Détail de la dette", 105, 30, { align: 'center' });
        
        doc.setFontSize(10);
        doc.text(`N° Facture: ${inv.invoiceNumber || 'N/A'}`, 15, 50);
        doc.text(`Date: ${new Date().toLocaleDateString('fr-FR')}`, 15, 57);
        doc.text(`Client: ${inv.client?.name || 'Non renseigné'}`, 15, 64);
        doc.text(`Téléphone: ${inv.client?.phone || '--'}`, 15, 71);
        
        let y = 90;
        doc.text("Détail des articles:", 15, y);
        y += 8;
        
        if (inv.items) {
            inv.items.forEach(item => {
                doc.text(`${item.name} x ${item.quantity}`, 20, y);
                doc.text(`${(item.subtotal || 0).toLocaleString('fr-FR')} F CFA`, 180, y, { align: 'right' });
                y += 7;
            });
        }
        
        y += 10;
        doc.line(15, y, 195, y);
        y += 8;
        
        doc.setFontSize(12);
        doc.text(`TOTAL: ${(inv.total || 0).toLocaleString('fr-FR')} F CFA`, 180, y, { align: 'right' });
        y += 10;
        doc.text(`Montant payé: ${(paiement.montantPaye || 0).toLocaleString('fr-FR')} F CFA`, 180, y, { align: 'right' });
        y += 10;
        doc.text(`Reste à payer: ${reste.toLocaleString('fr-FR')} F CFA`, 180, y, { align: 'right' });
        
        doc.save(`Facture_${inv.invoiceNumber || 'dette'}.pdf`);
        showMessage('PDF généré', 'success');
    }
    
    function closeModal() {
        document.getElementById('debtModal').style.display = 'none';
        currentInvoice = null;
    }
    
    function showMessage(text, type) {
        const msg = document.createElement('div');
        msg.className = `message ${type}`;
        msg.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${text}`;
        document.body.appendChild(msg);
        setTimeout(() => {
            msg.style.animation = 'slideOut 0.3s ease';
            setTimeout(() => msg.remove(), 300);
        }, 3000);
    }
    
    // Événements
    document.getElementById('backToSiteBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
    });
    
    document.getElementById('refreshBtn').addEventListener('click', loadDebts);
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('statusFilter').addEventListener('change', applyFilters);
    document.getElementById('boutiqueFilter').addEventListener('change', applyFilters);
    document.getElementById('updatePaymentBtn')?.addEventListener('click', updatePayment);
    document.getElementById('printPDFBtn')?.addEventListener('click', generatePDF);
    
    // Chargement initial
    loadDebts();
</script>

</body>
</html>
